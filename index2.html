<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body{
    background-color: rgb(39, 201, 193);
    opacity:1;
    /* make transparent at 1 high opacity more transparent */
}
h1{
    color:Red;
    text-align: center;
    /* background-color: yellow; */
    font-size: 80px;
margin-bottom:40px;
margin-top: 0px;
}
p{
    margin-left:70%;
    margin-top: 0px;
    margin-bottom: 40px;
    background-color: rgba(15,0,0,0.5);
    color:red;
    font-size: 50px;
    margin-bottom: 10px;
    border: solid;
    border-color: black;
    border-radius: 2px;
    border-width: 5px;
    border-radius: 20px;
}
h2{
    margin-left: 30%;
    margin-right: 30%;
    margin-bottom: 40px;
    text-align: center;
    /* background-color: red; */
    border: 2px solid black;
    border-width: 5px;
    border-radius: 20px;
    font-size: 50px;
    font-family: 'Courier New', Courier, monospace;
color:blue;
}
#head2{
    color:red;
    /* this will override h2 font color to yellow */
}
h3{
    background-color: blue;
    color:yellow;

}
.head3{

   
    border: solid;
    border-color: black;
    border-radius: 2px;
    border-width: 5px;
    border-radius: 20px;
    font-size: 50px;
    margin-right: 70%;
    /* margin-left: 25%; */
    color:rgb(255, 0, 0);
    background-color: rgba(0,0,0,0.5);
    /* make the bgc black with blur because of last value that is alpha=0.5 */
    /* if alpha =0 it will transparent  */
}
</style>   
</head>
<body>
    <h1>This is First Page</h1>
    <p>move to right</p>
     <h2 id="head2">This is Second Heading</h2>
  <h3 class="head3">Move to the Left</h3>
    </body>
</html>
